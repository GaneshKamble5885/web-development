<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
     <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="search">
            <input type="text" placeholder="Enter city name" id="city">
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <div class="sun">
            <div class="logo">
                <i class="fa-solid fa-sun"></i>
            </div>
        </div>
        <div class="tempreture">
            <h1 id="city-temp">22&deg;c</h1>
            <h3 id="city-name">Germany</h3>
        </div>
        <div class="bottom">
            <div class="humidity">
                <div class="hum-logo">
                    <i class="fa-solid fa-water"></i>
                </div>
                <div class="hum-tempreture">
                    <h2 id="humidity-value">22%</h2>
                    <h4>humidity</h4>
                </div>

            </div>
            <div class="wind">
                <div class="wind-logo">
                    <i class="fa-solid fa-wind"></i>
                </div>
                <div class="wind-tempreture">
                    <h2 id="wind-value">22 km/h</h2>
                    <h4>wind speed</h4>
                </div>

            </div>
        </div>
    </div>






    <script src="script.js"></script>
</body>

</html>
