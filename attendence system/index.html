<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="primary">
            <div class="info">
                <h1>Student Management System</h1>
            </div>

            </div>
            <div class="search">
                <input type="text" id="insert">
                <button id="addrecord">Add student</button>

        </div>
        <div class="box">
            <div class="roll">
                Roll No
            </div>
            <div class="name">
                Student Name
            </div>
            <div class="status">
                Status
            </div>
        </div>

    </div>







    <script src="script.js"></script>
</body>

</html>
